project_id_env: CROWDIN_PROJECT_ID
api_token_env: CROWDIN_PERSONAL_TOKEN
base_path: '.'
preserve_hierarchy: true

files:
  # `**` in `translation` expands to the same sub-path the source had, so
  # chunks/en/pages/dashboard.json maps to chunks/uk/pages/dashboard.json.
  #
  # `update_option` governs what happens to a translation when its English source
  # string is edited. The Crowdin default deletes the translation outright;
  # `update_as_unapproved` keeps the old text but strips approved status so it
  # resurfaces for review. Abolished alternative: `update_without_changes` keeps a
  # stale translation marked approved against new source text.
  - source: /packages/frontend/src/i18n/locales/chunks/en/**/*.json
    translation: /packages/frontend/src/i18n/locales/chunks/%two_letters_code%/**/%original_file_name%
    update_option: update_as_unapproved

  - source: /packages/backend/src/i18n/locales/en.json
    translation: /packages/backend/src/i18n/locales/%two_letters_code%.json
    update_option: update_as_unapproved
