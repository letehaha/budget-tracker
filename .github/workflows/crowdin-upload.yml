name: Crowdin Upload Sources

# Pushes English source strings to Crowdin. Translations only travel the other
# direction, in crowdin-download.yml

on:
  push:
    branches: [main]
    paths:
      - 'packages/frontend/src/i18n/locales/chunks/en/**'
      - 'packages/backend/src/i18n/locales/en.json'
      - 'crowdin.yml'
  workflow_dispatch:

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: crowdin/github-action@v2
        with:
          upload_sources: true
          # Keeps the sync one-way. Enabling this would push in-repo translations
          # back to Crowdin on every source change, overwriting newer work done in
          # the Crowdin editor.
          upload_translations: false
          download_translations: false
        env:
          CROWDIN_PROJECT_ID: ${{ secrets.CROWDIN_PROJECT_ID }}
          CROWDIN_PERSONAL_TOKEN: ${{ secrets.CROWDIN_PERSONAL_TOKEN }}
