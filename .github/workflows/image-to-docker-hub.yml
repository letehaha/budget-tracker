name: Update images on VPS

on:
  workflow_run:
    workflows: ['Lint, Test and Build']
    types:
      - completed
    branches: [main]
  workflow_dispatch:

jobs:
  # Create database backup before deployment
  backup:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    uses: ./.github/workflows/database-backup.yml
    with:
      backup_reason: 'pre-deployment'
    secrets: inherit

  build:
    needs: [backup]
    runs-on: ubuntu-latest
    # Always run build if backup completed (success or failure) - don't block deploys on backup issues
    # But don't run if the workflow was triggered by a failed CI run
    if: ${{ always() && (github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success') }}

    steps:
      - name: Check if user is authorized
        if: github.event_name == 'workflow_dispatch'
        run: |
          if [[ "${{ github.actor }}" != "letehaha" ]]; then
            echo "Error: Only letehaha can manually trigger this workflow"
            exit 1
          fi
          echo "User authorized: ${{ github.actor }}"

      - name: Checkout repository
        uses: actions/checkout@v4

      # Immutable per-build tag pushed alongside :latest so self-hosters can
      # pin an exact image (github.sha short form).
      - name: Compute short SHA
        id: vars
        run: echo "sha_short=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      # This image is the self-host image: letehaha/budget-tracker-fe is what
      # self-hosters pull. Deployment-specific values (API origin, analytics
      # keys, CSP hosts) belong to whoever runs the container, not to this
      # build — they enter at container start via the entrypoint's runtime
      # env, so only build-identity and source-map-upload inputs go here.
      - id: frontend-docker-build
        uses: ./.github/actions/frontend-docker-build
        with:
          sentry-auth-token: ${{ secrets.SENTRY_AUTH_TOKEN }}
          sentry-org: ${{ secrets.SENTRY_ORG }}
          sentry-project: ${{ secrets.SENTRY_PROJECT }}
          sentry-release: ${{ github.sha }}
          app-commit-hash: ${{ github.sha }}
          docker-hub-username: ${{ secrets.DOCKER_HUB_USERNAME }}
          docker-hub-access-token: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}
          image-tag: latest,sha-${{ steps.vars.outputs.sha_short }}
          platforms: linux/amd64,linux/arm64
          push: 'true'

      - id: backend-docker-build
        uses: ./.github/actions/backend-docker-build
        with:
          docker-hub-username: ${{ secrets.DOCKER_HUB_USERNAME }}
          docker-hub-access-token: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}
          sentry-release: ${{ github.sha }}
          image-tag: latest,sha-${{ steps.vars.outputs.sha_short }}
          platforms: linux/amd64,linux/arm64
          push: 'true'

      - name: Trigger Dokploy deployment
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.DOKPLOY_DEPLOY_WEBHOOK_URL }}" | grep -q "200" \
            || (echo "Dokploy deploy webhook failed" && exit 1)
