name: Crowdin Download Translations

# Opens a PR with translations done in Crowdin. Runs on its own schedule rather
# than on push, so merging to dev doesn't open a translation PR every time.
#
# This harvests work done by translators in the Crowdin editor. Bulk-translating a
# release is a separate, manual step the release author runs locally.

on:
  schedule:
    - cron: '0 6 * * 1' # Mondays 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: crowdin/github-action@v2
        with:
          upload_sources: false
          upload_translations: false
          download_translations: true
          # Untranslated strings arrive filled with English source text, which is
          # Crowdin's default and the reason no `skip_untranslated_strings` key is
          # set here. Enabling it is a footgun: the frontend serves each locale's
          # messages as lazily-loaded chunks and never loads the `en` copy
          # alongside, so vue-i18n's `fallbackLocale` has nothing in memory to
          # resolve against and an omitted key renders as its raw path on screen.
          localization_branch_name: l10n_crowdin
          create_pull_request: true
          pull_request_title: 'chore(i18n): new Crowdin translations'
          pull_request_base_branch_name: dev
        env:
          # PAT. Scoped separately for the exact needs of Crowdin
          GITHUB_TOKEN: ${{ secrets.CROWDIN_GH_TOKEN }}
          CROWDIN_PROJECT_ID: ${{ secrets.CROWDIN_PROJECT_ID }}
          CROWDIN_PERSONAL_TOKEN: ${{ secrets.CROWDIN_PERSONAL_TOKEN }}
