# Optional overlay: build the backend and frontend images from source instead
# of pulling the published ones. For contributors and forks.
#
# Usage (merge on top of the base file, add --build, from this folder):
#   docker compose -f docker-compose.yml -f docker-compose.build.yml up -d --build
#
# Runtime configuration is unchanged: the frontend is still configured via the
# `environment:` block in the base file, and the backend via `env_file:`. The
# build args below only feed build-time concerns (e.g. Sentry source-map upload)
# and are all optional.

services:
  backend:
    build:
      context: ..
      dockerfile: self-hosting/backend/Dockerfile
      args:
        SENTRY_RELEASE: ${VITE_SENTRY_RELEASE:-}

  frontend:
    build:
      context: ..
      dockerfile: self-hosting/frontend/Dockerfile
      args:
        SENTRY_AUTH_TOKEN: ${SENTRY_AUTH_TOKEN:-}
        SENTRY_ORG: ${SENTRY_ORG:-}
        SENTRY_PROJECT: ${SENTRY_PROJECT:-}
        VITE_SENTRY_RELEASE: ${VITE_SENTRY_RELEASE:-}
